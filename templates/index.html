<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector 🇮🇳</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2, #f64f59);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: 'Segoe UI', sans-serif;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            text-align: center;
            padding: 20px;
        }

        .result h2 {
            font-size: 1.8rem;
            color: {{ color }};
            margin-bottom: 8px;
        }

        .result p {
            font-size: 1rem;
            color: #666;
        }

        .confidence {
            background: #f5f5f5;
            border-radius: 10px;
            height: 10px;
            margin-top: 12px;
            overflow: hidden;
        }

        .confidence-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            width: 0%;
            id="conf-bar"
        }


        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            text-align: center;
        }

        .stat {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            padding: 16px;
            color: white;
        }

        .stat h3 { font-size: 1.4rem; }
        .stat p { font-size: 0.8rem; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Header -->
        <div class="header">
            <h1>🛡️ Fake News Detector</h1>
            <p>AI-powered misinformation detector for India 🇮🇳</p>
        </div>

        <!-- Stats -->
        <div class="card">
            <div class="stats">
                <div class="stat">
                    <h3>98%</h3>
                    <p>Accuracy</p>
                </div>
                <div class="stat">
                    <h3>45K+</h3>
                    <p>News trained</p>
                </div>
                <div class="stat">
                    <h3>2sec</h3>
                    <p>Response time</p>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="card">
            <h3 style="margin-bottom: 12px; color: #333;">📰 Paste your news here</h3>
            <form action="/predict" method="POST">
                <textarea name="news" 
                    placeholder="Paste any news headline or article here...">{{ news }}</textarea>
                <button type="submit">🔍 Analyze News</button>
            </form>
        </div>

        <!-- Result -->
        {% if result %}
        <div class="card result">
            <h2 style="color: {{ color }};">{{ result }}</h2>
            <p>Confidence: <b>{{ score }}%</b></p>
            <div class="confidence">
                <div class="confidence-bar"></div>
            </div>
            <br>
            <p style="color: #888; font-size: 13px;">
                Verify on: AltNews.in | BoomLive.in | FactChecker.in
            </p>
        </div>
        {% endif %}

    </div>
<script>
 {% if score %}
document.getElementById('conf-bar').style.width = '{{ score }}%';
{% endif %}
</script>
</body>
</html>
